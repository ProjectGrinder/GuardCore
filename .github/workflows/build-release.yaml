name: Build-Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "tag: Git tag to create (e.g., 1.0.0)"
        required: true
      dry-run:
        description: "dry-run: true will skip publishing to NuGet."
        required: true
        default: false
        type: boolean

jobs:
  build-and-publish:
    permissions:
      contents: write
      id-token: write # Mandatory for NuGet Trusted Publish (OIDC)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Source Tree
        uses: actions/checkout@v7

      - name: Setup .NET Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Compile Library (Release Configuration)
        run: dotnet build -c Release -p:Version=${{ inputs.tag }}

      - name: Verify Primitives Matrix
        run: dotnet test -c Release --no-build

      - name: Pack Production NuGet Package
        run: dotnet pack -c Release -p:Version=${{ inputs.tag }} -o ./publish

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: ./publish/
          retention-days: 7

      - name: Authenticate with NuGet via OIDC
        if: ${{ !inputs.dry-run }}
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push Package to NuGet Gallery
        if: ${{ !inputs.dry-run }}
        run: dotnet nuget push "./publish/*.nupkg" --skip-duplicate -s https://api.nuget.org/v3/index.json -k "${NUGET_KEY}"
        env:
          NUGET_KEY: ${{ steps.nuget_login.outputs.NUGET_API_KEY }}

      - name: Generate GitHub Release Tags
        if: ${{ !inputs.dry-run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.tag }}
          name: Release v${{ inputs.tag }}
          generate_release_notes: true
          files: ./publish/*.nupkg
