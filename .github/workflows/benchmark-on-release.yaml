name: Benchmark on release
run-name: Start benchmarks on release (${{ github.ref_name }})

on:
  workflow_dispatch:
  release:
    types: [released]

jobs:
  benchmarks:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: write
    steps:
      - name: Invoke benchmark workflows
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const baseOptions = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'benchmark.yaml',
                ref: '${{ github.ref_name }}'
              }

              // 1. Start standard `Default` benchmark suite
              await github.rest.actions.createWorkflowDispatch({
                ...baseOptions,
                inputs: {
                  config: 'Default',
                }
              })

              // 2. Start cross-runtime `TargetFrameworks` benchmarks (e.g., net8.0 vs net10.0)
              await github.rest.actions.createWorkflowDispatch({
                ...baseOptions,
                inputs: {
                  config: 'TargetFrameworks',
                }
              })

              // 3. Start `Default` benchmarks on `main` branch to update README.md report links
              await github.rest.actions.createWorkflowDispatch({
                ...baseOptions,
                ref: 'main',
                inputs: {
                  config: 'Default',
                }
              })
            }
            catch(error) {
              console.error(error)
              core.setFailed(error)
            }
